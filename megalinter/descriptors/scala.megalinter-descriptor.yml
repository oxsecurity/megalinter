---
descriptor_id: SCALA
descriptor_type: language
file_extensions:
  - ".scala"
install:
  apk:
    - openjdk21
  dockerfile:
    - ENV JAVA_HOME=/usr/lib/jvm/java-21-openjdk
    - ENV PATH="$JAVA_HOME/bin:${PATH}"
    - |-
      # renovate: datasource=github-tags depName=coursier/coursier
      ARG SCALA_COURSIER_VERSION=2.1.24
    - |
      RUN curl --retry-all-errors --retry 10 -fLo coursier https://github.com/coursier/coursier/releases/download/v${SCALA_COURSIER_VERSION}/coursier.jar && \
              chmod +x coursier
supported_platforms:
  platform:
    - linux/amd64
    - linux/arm64
linters:
  # SCALAFIX
  - linter_name: scalafix
    linter_url: https://scalacenter.github.io/scalafix/
    linter_repo: https://github.com/scalacenter/scalafix
    linter_spdx_license: BSD-3-Clause
    linter_text: |
      **Scalafix** is a refactoring and linting tool for Scala that automates code quality maintenance, enabling both one-time migrations and continuous code health enforcement.

      **Key Features:**

      - **Automated Refactoring**: Handles day-to-day code maintenance tasks and complex migration scripts with precision
      - **Comprehensive Linting**: Reports errors for code patterns that cause production bugs or violate coding standards
      - **Syntactic and Semantic Rules**: Supports both syntax-based rules (no compilation needed) and semantic rules (requires compilation)
      - **Built-in Rule Library**: Extensive collection of rules for common Scala patterns, deprecations, and best practices
      - **Custom Rule Development**: Extensible architecture for writing project-specific rules and transformations
      - **Configuration Flexibility**: Highly configurable through `.scalafix.conf` files with rule-specific settings

      **Note**: In MegaLinter, only syntactic rules are applied as there is no prior compilation or semantic database generation. Semantic options cannot be used in this context.
    linter_rules_url: https://scalacenter.github.io/scalafix/docs/rules/overview.html
    linter_rules_configuration_url: https://scalacenter.github.io/scalafix/docs/users/configuration.html
    linter_rules_inline_disable_url: https://scalacenter.github.io/scalafix/docs/users/suppression.html
    linter_image_url: https://scalacenter.github.io/scalafix/img/scalacenter2x.png
    linter_megalinter_ref_url: https://scalacenter.github.io/scalafix/docs/users/installation.html#plugins-for-other-build-tools
    config_file_name: .scalafix.conf
    cli_config_arg_name: "--config"
    cli_lint_extra_args:
      - "--check"
      # cli_lint_fix_arg_name: '--megalinter-fix-flag' # MegaLinter workaround
      # cli_lint_fix_remove_args:
      # - "--check"
    common_linter_errors:
      - identifier: SCALA_SCALAFIX_ERROR_RULE_NOT_FOUND
        regex: '(Unknown rule|rule not found|Rule \S+ not found)'
        message: |-
          scalafix could not find a rule referenced in your `.scalafix.conf` (or `--rules` argument).
          Resolutions:
            - Check the spelling against the [scalafix built-in rules](https://scalacenter.github.io/scalafix/docs/rules/overview.html).
            - MegaLinter runs scalafix without the project's classpath, so **semantic** rules (those needing a SemanticDB) cannot be loaded — use only syntactic rules in `.scalafix.conf`.
            - Third-party rule artifacts are not available in MegaLinter; vendor the rule source into the repo or remove it.
      - identifier: SCALA_SCALAFIX_ERROR_NO_SEMANTICDB
        regex: "(SemanticDB not found|Missing SemanticDB|semanticdb-scalac)"
        message: |-
          scalafix tried to run a semantic rule but no SemanticDB was produced.
          MegaLinter does not compile your project, so semantic rules cannot run here.
          Resolutions:
            - Remove semantic rules from `.scalafix.conf` (keep only syntactic ones such as `DisableSyntax`, `LeakingImplicitClassVal`, `NoAutoTupling`, `NoValInForComprehension`, `ProcedureSyntax`, `RemoveUnused`).
            - Run semantic-rule scalafix from your build tool (sbt/Mill) outside MegaLinter.
      - identifier: SCALA_SCALAFIX_ERROR_CONFIG_PARSE
        regex: 'ConfError|Invalid config|expected .* at .*\.scalafix\.conf'
        message: |-
          scalafix could not parse `.scalafix.conf`.
          Resolutions:
            - Validate the HOCON syntax of `.scalafix.conf` (quoting, braces, commas).
            - Confirm each rule key exists; see the [scalafix configuration guide](https://scalacenter.github.io/scalafix/docs/users/configuration.html).
    examples:
      - "scalafix --check myfile.scala"
      - "scalafix --check --config .scalafix.conf myfile.scala"
      - "scalafix --config .scalafix.conf myfile.scala" # Fix
    install:
      dockerfile:
        - |-
          # renovate: datasource=github-tags depName=scalacenter/scalafix
          ARG SCALA_SCALAFIX_VERSION=0.14.7
        - RUN ./coursier install scalafix:${SCALA_SCALAFIX_VERSION} --quiet --install-dir /usr/bin && rm -rf /root/.cache
    supported_platforms:
      platform:
        - linux/amd64
        - linux/arm64
