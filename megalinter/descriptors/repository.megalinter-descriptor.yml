  # TRUFFLEHOG
  - class: TruffleHogLinter
    linter_name: trufflehog
    linter_text: |
      **TruffleHog** is an advanced secrets scanner that searches through git repositories, files, and other sources to find secrets, passwords, API keys, and other sensitive information that may have been accidentally committed to code. It combines pattern matching, entropy analysis, and verification capabilities to provide comprehensive secret detection.

      **Key Features:**

      - **Git History Scanning**: Deep analysis of entire git history including all branches, commits, and deleted files
      - **Entropy Analysis**: Advanced mathematical analysis to detect high-entropy strings that may be secrets
      - **Pattern Matching**: Extensive library of regex patterns for detecting known secret formats from popular services
      - **Secret Verification**: Validates detected secrets by attempting authentication with the actual services
      - **Multi-Source Support**: Scans git repositories, filesystems, cloud storage, databases, and container images
      - **Custom Detectors**: Extensible framework for adding organization-specific secret detection patterns
      - **Performance Optimized**: Efficient scanning algorithms suitable for large repositories and continuous monitoring
      - **Detailed Reporting**: Comprehensive output with context, verification status, and remediation guidance
      - **False Positive Management**: Sophisticated filtering and ignore systems to reduce noise and focus on real threats
    descriptor_flavors:
      - all_flavors # Applicable to CI in any language project
      - ci_light
      - cupcake
      - security
    linter_speed: 2
    linter_url: https://github.com/trufflesecurity/trufflehog
    linter_repo: https://github.com/trufflesecurity/trufflehog
    linter_banner_image_url: https://storage.googleapis.com/trufflehog-static-sources/pixel_pig.png
    linter_icon_png_url: https://raw.githubusercontent.com/oxsecurity/megalinter/main/docs/assets/icons/linters/trufflehog.png
    linter_rules_configuration_url: https://github.com/trufflesecurity/trufflehog#regex-detector-alpha
    cli_lint_mode: project
    supported_cli_lint_modes:
      - file
      - list_of_files
      - project
    cli_config_arg_name: "--config"
    config_file_name: .trufflehog.yml
    cli_lint_extra_args:
      - --fail
      - --only-verified
      - --no-update
      - filesystem
    cli_lint_mode_project_extra_args_after:
      - .
    cli_help_arg_name: --help
    cli_version_arg_name: --version
    examples:
      - "trufflehog filesystem ."
    install:
      dockerfile:
        - |-
          # renovate: datasource=docker depName=trufflesecurity/trufflehog
          ARG REPOSITORY_TRUFFLEHOG_VERSION=3.95.9
        - FROM trufflesecurity/trufflehog:${REPOSITORY_TRUFFLEHOG_VERSION} AS trufflehog
        - COPY --link --from=trufflehog /usr/bin/trufflehog /usr/bin/
    supported_platforms:
      platform:
        - linux/amd64
        - linux/arm64
    test_folder: repository_trufflehog
  # kingfisher
  - class: KingfisherLinter
    linter_name: kingfisher
    can_output_sarif: true
    descriptor_flavors:
      - all
      - security
    linter_text: |
      **kingfisher** is a blazingly fast secret-scanning and live validation tool built in Rust. It combines Intel's SIMD-accelerated regex engine (Hyperscan) with language-aware parsing to achieve high accuracy at massive scale, and ships with hundreds of built-in rules to detect, validate, and triage secrets before they ever reach production.

      **Key Features:**

      - **Performance:** multithreaded, Hyperscan-powered scanning built for huge codebases
      - **Extensible rules:** hundreds of built-in detectors plus YAML-defined custom rules (docs/RULES.md)
      - **Blast Radius Mapping:** instantly map leaked keys to their effective cloud identities and exposed resources with --access-map
      - **Broad AI SaaS coverage:** finds and validates tokens for OpenAI, Anthropic, Google Gemini, Cohere, AWS Bedrock, Voyage AI, Mistral, Stability AI, Replicate, xAI (Grok), Ollama, Langchain, Perplexity, Weights & Biases, Cerebras, Friendli, Fireworks.ai, NVIDIA NIM, Together.ai, Zhipu, and many more
      - **Compressed Files:** Supports extracting and scanning compressed files for secrets
      - **Baseline management:** generate and track baselines to suppress known secrets (docs/BASELINE.md)
      - **Checksum-aware detection:** verifies tokens with built-in checksums (e.g., GitHub, Confluent, Zuplo) — no API calls required
      - **Built-in Report Viewer:** Visualize and triage findings locally with kingfisher view ./report-file.json
    linter_url: https://github.com/mongodb/kingfisher
    linter_repo: https://github.com/mongodb/kingfisher
    linter_spdx_license: Apache-2.0
    linter_rules_url: https://mongodb.github.io/kingfisher/rules/builtin-rules
    linter_rules_inline_disable_url: https://mongodb.github.io/kingfisher/usage/advanced/?h=inline#inline-ignore-directives
    test_folder: repository_kingfisher
    cli_lint_mode: project
    supported_cli_lint_modes:
      - file
      - list_of_files
      - project
    cli_lint_extra_args:
      - "scan"
      - "--redact"
      - "--git-history=none"
    cli_lint_mode_project_extra_args_after:
      - .
    cli_sarif_args:
      - --format
      - sarif
    common_linter_errors:
      - identifier: REPOSITORY_KINGFISHER_ERROR_GITHUB_API_RATE_LIMIT
        regex: "(API rate limit exceeded|GitHub API.*rate limit|secondary rate limit)"
        message: |-
          kingfisher hit the GitHub API rate limit while resolving or validating findings.
          This is an API quota issue, not a code finding.
          Resolutions:
            - Provide a token via `KF_GITHUB_TOKEN` to raise the rate limit. Because MegaLinter strips token-like env vars by default, you must also whitelist it for this linter in your .mega-linter.yml:
                REPOSITORY_KINGFISHER_UNSECURED_ENV_VARIABLES:
                  - KF_GITHUB_TOKEN
            - Retry the run later once the quota resets.
            - Temporarily mark the linter as non-blocking by adding to your .mega-linter.yml:
                DISABLE_ERRORS_LINTERS:
                  - REPOSITORY_KINGFISHER
      - identifier: REPOSITORY_KINGFISHER_ERROR_GITHUB_TOKEN_UNAUTHORIZED
        regex: "(401 Unauthorized|Bad credentials)"
        message: |-
          kingfisher could not authenticate to the GitHub API while validating a secret or fetching repo metadata.
          Resolutions:
            - Verify `KF_GITHUB_TOKEN` is set, is not expired, and is whitelisted for this linter (MegaLinter strips token-like env vars by default):
                REPOSITORY_KINGFISHER_UNSECURED_ENV_VARIABLES:
                  - KF_GITHUB_TOKEN
            - For org-scoped resources, ensure the token has the required scopes (e.g. `repo`, `read:org`).
      - identifier: REPOSITORY_KINGFISHER_ERROR_RULES_LOAD_FAILED
        regex: "(Failed to load (builtin )?rules|Failed to parse YAML from|Failed to build regex|Unknown rule:)"
        message: |-
          kingfisher failed to load its detection rules. This typically means a custom YAML rules file passed via `--rules-path` is malformed.
          Resolutions:
            - Remove the custom rules path and rely on the built-in rules.
            - Validate your custom YAML rules against `docs/RULES.md` in the kingfisher repo.
    examples:
      - "kingfisher scan ."
    install:
      dockerfile:
        - |-
          # renovate: datasource=github-tags depName=mongodb/kingfisher
          ARG REPOSITORY_KINGFISHER_VERSION=1.106.0
        - |
          RUN curl --silent --location https://raw.githubusercontent.com/mongodb/kingfisher/main/scripts/install-kingfisher.sh | bash -s -- /usr/local/bin --tag "v${REPOSITORY_KINGFISHER_VERSION}"
    supported_platforms:
      platform:
        - linux/amd64
        - linux/arm64
