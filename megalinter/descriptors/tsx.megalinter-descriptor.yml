---
descriptor_id: TSX
descriptor_type: language
descriptor_flavors:
  - cupcake
  - dotnetweb
  - javascript
file_extensions:
  - ".tsx"
linters:
  # ESLINT
  - class: EslintLinter
    linter_name: eslint
    can_output_sarif: true
    linter_text: |
      **ESLint with React Plugin** provides comprehensive linting for TSX (TypeScript React) files, combining ESLint's powerful static analysis with React-specific rules to ensure high-quality React applications written in TypeScript.

      **Key Features:**

      - **React-Specific Linting**: Comprehensive rules covering React best practices, hooks usage, JSX syntax, and component lifecycle patterns
      - **TypeScript Integration**: Full TypeScript support for type-aware linting in React components with proper TSX syntax validation
      - **Hooks Rules**: Comprehensive validation of React Hooks usage patterns, dependencies, and effect cleanup
      - **Performance Optimization**: Rules to detect unnecessary re-renders, missing dependency arrays, and performance anti-patterns
      - **Modern React Patterns**: Support for latest React features including Suspense, Error Boundaries, and concurrent features

      ESLint requires a custom configuration file applicable to your project. You can create it by typing `npx eslint --init` in the root of your repository

      ### ESLint v10 — resolving bare imports from `eslint.config.mjs`

      ESLint v10 dropped support for the legacy `.eslintrc.*` format and only loads the new flat config (`eslint.config.*`). When MegaLinter runs ESLint from its own container install (`/node-deps/node_modules`) instead of your project's local `node_modules`, Node's ESM resolver may fail to locate bare imports such as `import js from '@eslint/js'` (upstream limitation tracked in [eslint/eslint#18465](https://github.com/eslint/eslint/issues/18465)), producing errors like:

      ```text
      Error [ERR_MODULE_NOT_FOUND]: Cannot find package '@eslint/js' imported from /github/workspace/eslint.config.mjs
      ```

      Two recommended workarounds:

      1. **Use `createRequire` in `eslint.config.mjs`** so bare imports fall back to CommonJS resolution (which honors `NODE_PATH` and will pick up MegaLinter's bundled `@eslint/js`, `@typescript-eslint/eslint-plugin`, etc.):

          ```js
          import { createRequire } from 'module';
          const require = createRequire(import.meta.url);
          const js = require('@eslint/js');
          const tsPlugin = require('@typescript-eslint/eslint-plugin');
          const reactPlugin = require('@eslint-react/eslint-plugin');
          ```

      2. **Install your project's dependencies in a pre-command and point MegaLinter at the project-local ESLint binary**, so ESLint runs from `<workspace>/node_modules` and resolves your config's imports naturally:

          ```yaml
          TSX_ESLINT_PRE_COMMANDS:
            - command: yarn install --frozen-lockfile --ignore-scripts
              cwd: workspace
              continue_if_failed: false
          TSX_ESLINT_CLI_EXECUTABLE: node_modules/.bin/eslint
          ```

          Replace `yarn install --frozen-lockfile --ignore-scripts` with `npm ci` (or `npm install --include=dev`) if your project uses npm.
    linter_url: https://github.com/Rel1cx/eslint-react
    linter_repo: https://github.com/Rel1cx/eslint-react
    linter_rules_url: https://eslint-react.xyz/docs/rules/overview
    linter_banner_image_url: https://d33wubrfki0l68.cloudfront.net/3b5ac7586466159bb6f237b633bfc4f5a8d5acf8/ee0a1/assets/img/posts/eslint-collective.png
    linter_rules_configuration_url: https://eslint-react.xyz/docs/getting-started/installation
    linter_rules_inline_disable_url: https://eslint.org/docs/latest/use/configure/rules#disabling-rules
    linter_rules_ignore_config_url: https://eslint.org/docs/latest/use/configure/ignore#the-eslintignore-file
    linter_megalinter_ref_url: https://eslint.org/docs/latest/use/integrations#source-control
    linter_spdx_license: MIT
    active_only_if_file_found:
      - "eslint.config.js"
      - "eslint.config.mjs"
      - "eslint.config.cjs"
      - "eslint.config.ts"
      - ".eslintrc.json"
      - ".eslintrc.yml"
      - ".eslintrc.yaml"
      - ".eslintrc.js"
      - ".eslintrc.cjs"
      - "package.json:eslintConfig"
    cli_lint_mode: list_of_files
    config_file_name: eslint.config.cjs
    cli_lint_extra_args:
      - "--no-ignore"
    cli_lint_fix_arg_name: "--fix"
    cli_sarif_args:
      - --format
      - "@microsoft/eslint-formatter-sarif"
      - -o
      - "{{SARIF_OUTPUT_FILE}}"
    cli_lint_errors_count: regex_sum
    cli_lint_errors_regex: "✖ ([0-9]+) problem"
    examples:
      - "eslint myfile.tsx"
      - "eslint -c eslint.config.js --no-ignore myfile.tsx"
      - "eslint --fix -c eslint.config.js --no-ignore myfile.tsx"
    install:
      dockerfile:
        - |-
          # renovate: datasource=npm depName=typescript
          ARG NPM_TYPESCRIPT_VERSION=6.0.3
        - |-
          # renovate: datasource=npm depName=eslint
          ARG NPM_ESLINT_VERSION=10.3.0
        - |-
          # renovate: datasource=npm depName=@eslint/eslintrc
          ARG NPM_ESLINT_ESLINTRC_VERSION=3.3.5
        - |-
          # renovate: datasource=npm depName=eslint-config-prettier
          ARG NPM_ESLINT_CONFIG_PRETTIER_VERSION=10.1.8
        - |-
          # renovate: datasource=npm depName=eslint-plugin-jest
          ARG NPM_ESLINT_PLUGIN_JEST_VERSION=29.15.2
        - |-
          # renovate: datasource=npm depName=eslint-plugin-prettier
          ARG NPM_ESLINT_PLUGIN_PRETTIER_VERSION=5.5.5
        - |-
          # renovate: datasource=npm depName=@eslint-react/eslint-plugin
          ARG NPM_ESLINT_REACT_ESLINT_PLUGIN_VERSION=5.7.8
        - |-
          # renovate: datasource=npm depName=prettier
          ARG NPM_PRETTIER_VERSION=3.8.3
        - |-
          # renovate: datasource=npm depName=prettyjson
          ARG NPM_PRETTYJSON_VERSION=1.2.5
        - |-
          # renovate: datasource=npm depName=@typescript-eslint/eslint-plugin
          ARG NPM_TYPESCRIPT_ESLINT_ESLINT_PLUGIN_VERSION=8.59.3
        - |-
          # renovate: datasource=npm depName=@typescript-eslint/parser
          ARG NPM_TYPESCRIPT_ESLINT_PARSER_VERSION=8.59.3
        - |-
          # renovate: datasource=npm depName=@microsoft/eslint-formatter-sarif
          ARG NPM_MICROSOFT_ESLINT_FORMATTER_SARIF_VERSION=3.1.0
      npm:
        - typescript@${NPM_TYPESCRIPT_VERSION}
        - eslint@${NPM_ESLINT_VERSION}
        - "@eslint/eslintrc@${NPM_ESLINT_ESLINTRC_VERSION}"
        - eslint-config-prettier@${NPM_ESLINT_CONFIG_PRETTIER_VERSION}
        - eslint-plugin-jest@${NPM_ESLINT_PLUGIN_JEST_VERSION}
        - eslint-plugin-prettier@${NPM_ESLINT_PLUGIN_PRETTIER_VERSION}
        - "@eslint-react/eslint-plugin@${NPM_ESLINT_REACT_ESLINT_PLUGIN_VERSION}"
        - prettier@${NPM_PRETTIER_VERSION}
        - prettyjson@${NPM_PRETTYJSON_VERSION}
        - "@typescript-eslint/eslint-plugin@${NPM_TYPESCRIPT_ESLINT_ESLINT_PLUGIN_VERSION}"
        - "@typescript-eslint/parser@${NPM_TYPESCRIPT_ESLINT_PARSER_VERSION}"
        - "@microsoft/eslint-formatter-sarif@${NPM_MICROSOFT_ESLINT_FORMATTER_SARIF_VERSION}"
    supported_platforms:
      platform:
        - linux/amd64
        - linux/arm64
    ide:
      brackets:
        - name: brackets-eslint
          url: https://github.com/brackets-userland/brackets-eslint
      eclipse:
        - name: Tern-Linter-ESLint
          url: https://github.com/angelozerr/tern.java/wiki/Tern-Linter-ESLint
      emacs:
        - name: flycheck
          url: http://www.flycheck.org/en/latest/languages.html#javascript
      idea:
        - name: ESLint Plugin
          url: https://plugins.jetbrains.com/plugin/7494-eslint
          id: com.wix.eslint
      sublime:
        - name: SublimeLinter-eslint
          url: https://github.com/roadhump/SublimeLinter-eslint
      vim:
        - name: ale
          url: https://github.com/w0rp/ale
        - name: Syntastic
          url: https://github.com/vim-syntastic/syntastic/tree/master/syntax_checkers/javascript
      vscode:
        - name: vscode-eslint
          url: https://marketplace.visualstudio.com/items?itemName=dbaeumer.vscode-eslint
