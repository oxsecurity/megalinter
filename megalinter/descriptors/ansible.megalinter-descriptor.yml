---
descriptor_id: ANSIBLE
descriptor_type: tooling_format
descriptor_flavors:
  - all_flavors # Applicable to CI in any language project
  - cupcake
  - security
file_names_not_ends_with:
  - "vault.yml"
  - "vault.yaml"
  - "galaxy.yml"
  - "galaxy.yaml"
file_extensions:
  - ".yml"
  - ".yaml"
linters:
  # ANSIBLE LINT
  - linter_name: ansible-lint
    linter_text: |
      **Ansible-lint** checks Ansible playbooks for practices and behavior that could potentially be improved. It's a community-backed project that helps enforce best practices and maintain high-quality Ansible code.

      **Key Features:**

      - **Best Practice Validation**: Checks playbooks against Ansible community best practices and conventions
      - **Auto-fixing**: Can automatically fix some of the most common issues found in playbooks
      - **Extensible Rules**: Comprehensive set of built-in rules with support for custom rules
      - **Multiple Output Formats**: Supports various output formats including SARIF for integration with security tools
      - **Configuration Flexibility**: Highly configurable with support for `.ansible-lint` configuration files
      - **Community Support**: Supports only the last two major versions of Ansible, ensuring compatibility

      **Common checks include:**

      - YAML syntax and formatting
      - Task and playbook structure validation
      - Security best practices (avoiding plain text secrets)
      - Proper use of Ansible modules and features
      - Naming conventions and documentation standards

      Ansible-lint helps teams maintain consistent, secure, and well-structured Ansible automation code.
    can_output_sarif: true
    linter_url: https://ansible-lint.readthedocs.io/
    linter_repo: https://github.com/ansible/ansible-lint
    linter_spdx_license: GPL-3.0-only
    linter_rules_url: https://ansible-lint.readthedocs.io/rules/
    linter_rules_configuration_url: https://ansible-lint.readthedocs.io/configuring/#configuration-file
    linter_rules_inline_disable_url: https://ansible-lint.readthedocs.io/usage/#muting-warnings-to-avoid-false-positives
    linter_icon_png_url: https://raw.githubusercontent.com/oxsecurity/megalinter/main/docs/assets/icons/linters/ansible-lint.png
    active_only_if_file_found:
      - ".ansible-lint"
      - ".ansible-lint.yml"
      - ".ansible-lint.yaml"
      - ".config/ansible-lint.yml"
      - ".config/ansible-lint.yaml"
    config_file_name: .ansible-lint
    cli_lint_mode: project
    cli_config_extra_args:
      - "-v"
    cli_sarif_args:
      - --format
      - sarif
    cli_lint_errors_count: regex_number
    cli_lint_errors_regex: ": ([0-9]+) failure\\(s\\), .* warning\\(s\\) in .* files processed"
    cli_version_arg_name: "--version"
    common_linter_errors:
      - identifier: ANSIBLE_ANSIBLE_LINT_ERROR_GALAXY_INSTALL_FAILED
        regex: "(ERROR! - galaxy:|Failed to (find|install) (collection|role)|Galaxy server.*returned)"
        message: |-
          ansible-lint failed while installing required Ansible Galaxy collections or roles before linting.
          This is a network/dependency-resolution problem, not a lint finding.
          Resolutions:
            - Retry the run; Galaxy outages are usually transient.
            - Pin collection/role versions in `requirements.yml` to avoid resolution drift.
            - If a Galaxy server requires auth, whitelist the relevant env var for this linter in your .mega-linter.yml (MegaLinter strips token-like env vars by default):
                ANSIBLE_ANSIBLE_LINT_UNSECURED_ENV_VARIABLES:
                  - ANSIBLE_GALAXY_SERVER_LIST
                  - ANSIBLE_GALAXY_TOKEN
      - identifier: ANSIBLE_ANSIBLE_LINT_ERROR_SYNTAX_CHECK
        regex: "(syntax-check\\[specific\\]|the (role|playbook) .* was not found|couldn't resolve (module|action))"
        message: |-
          ansible-lint's `syntax-check` rule could not resolve a referenced role, module, or playbook.
          Resolutions:
            - Pre-install required collections/roles from `requirements.yml` (in your repo) via a pre-command in your .mega-linter.yml:
                ANSIBLE_ANSIBLE_LINT_PRE_COMMANDS:
                  - command: "ansible-galaxy install -r requirements.yml"
                    cwd: "workspace"
                    continue_if_failed: false
            - Adjust `roles_path` / `collections_path` in `ansible.cfg` so ansible-lint can find them.
      - identifier: ANSIBLE_ANSIBLE_LINT_ERROR_CONFIG_INVALID
        regex: "(Invalid (configuration|rule|profile)|configuration file .* is malformed|failed to load .*\\.ansible-lint)"
        message: |-
          ansible-lint could not load its configuration file (`.ansible-lint` or `.config/ansible-lint.yml`).
          Resolutions:
            - Validate the YAML syntax of your `.ansible-lint` file.
            - Check that referenced rules, tags, and profile names exist in the installed ansible-lint version.
    examples:
      - "ansible-lint -v"
      - "ansible-lint -v -c .ansible-lint"
    install:
      dockerfile:
        - |-
          # renovate: datasource=pypi depName=ansible-lint
          ARG PIP_ANSIBLE_LINT_VERSION=26.4.0
      pip:
        - ansible-lint==${PIP_ANSIBLE_LINT_VERSION}
    supported_platforms:
      platform:
        - linux/amd64
        - linux/arm64
