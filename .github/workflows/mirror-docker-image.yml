name: Mirror docker image

on:
  workflow_dispatch:
    inputs:
      source-image:
        description: 'Source of the image on ghcr.io'
        required: true
      target-image:
        description: 'Target of the image hosted on docker hub'
        required: true
      free-space-before:
        description: 'Free space on the runner before pulling and pushing docker image'
        required: false
        default: 'true'

permissions:
  contents: read

concurrency:
  group: mirror-docker-image-${{ github.event.inputs.target-image }}
  cancel-in-progress: true

jobs:

  copy-to-docker-hub-alpha:
    if: github.ref_name == 'alpha' && endsWith(github.event.inputs.source-image,'alpha') && endsWith(github.event.inputs.target-image,'alpha')
    runs-on: ubuntu-latest
    environment:
      name: alpha
    steps:
      # Free disk space
      - name: Free Disk space
        if: github.event.inputs.free-space-before == 'true'
        shell: bash
        run: |
          sudo rm -rf /usr/local/lib/android  # will release about 10 GB if you don't need Android
          sudo rm -rf /usr/share/dotnet # will release about 20GB if you don't need .NET
          sudo rm -rf /opt/hostedtoolcache/CodeQL # large cache
          sudo rm -rf /opt/hostedtoolcache/go # Go toolcache
      # Login to docker hub
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      # Copy ghrc.io image to Docker Hub
      - name: Pull image from GHCR
        run: docker pull "${GITHUB_EVENT_INPUTS_SOURCE_IMAGE}"
        env:
          GITHUB_EVENT_INPUTS_SOURCE_IMAGE: ${{ github.event.inputs.source-image }}
      - name: Tag image for Docker Hub
        run: docker tag "${GITHUB_EVENT_INPUTS_SOURCE_IMAGE}" "${GITHUB_EVENT_INPUTS_TARGET_IMAGE}"
        env:
          GITHUB_EVENT_INPUTS_SOURCE_IMAGE: ${{ github.event.inputs.source-image }}
          GITHUB_EVENT_INPUTS_TARGET_IMAGE: ${{ github.event.inputs.target-image }}
      - name: Push image to Docker Hub
        run: docker push "${GITHUB_EVENT_INPUTS_TARGET_IMAGE}"
        env:
          GITHUB_EVENT_INPUTS_TARGET_IMAGE: ${{ github.event.inputs.target-image }}

  copy-to-docker-hub-main:
    if: github.ref_name == 'main' && endsWith(github.event.inputs.source-image,'beta') && endsWith(github.event.inputs.target-image,'beta')
    runs-on: ubuntu-latest
    environment:
      name: beta
    steps:
      # Free disk space
      - name: Free Disk space
        if: github.event.inputs.free-space-before == 'true'
        shell: bash
        run: |
          sudo rm -rf /usr/local/lib/android  # will release about 10 GB if you don't need Android
          sudo rm -rf /usr/share/dotnet # will release about 20GB if you don't need .NET
          sudo rm -rf /opt/hostedtoolcache/CodeQL # large cache
          sudo rm -rf /opt/hostedtoolcache/go # Go toolcache
      # Login to docker hub
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      # Copy ghrc.io image to Docker Hub
      - name: Pull image from GHCR
        run: docker pull "${GITHUB_EVENT_INPUTS_SOURCE_IMAGE}"
        env:
          GITHUB_EVENT_INPUTS_SOURCE_IMAGE: ${{ github.event.inputs.source-image }}
      - name: Tag image for Docker Hub
        run: docker tag "${GITHUB_EVENT_INPUTS_SOURCE_IMAGE}" "${GITHUB_EVENT_INPUTS_TARGET_IMAGE}"
        env:
          GITHUB_EVENT_INPUTS_SOURCE_IMAGE: ${{ github.event.inputs.source-image }}
          GITHUB_EVENT_INPUTS_TARGET_IMAGE: ${{ github.event.inputs.target-image }}
      - name: Push image to Docker Hub
        run: docker push "${GITHUB_EVENT_INPUTS_TARGET_IMAGE}"
        env:
          GITHUB_EVENT_INPUTS_TARGET_IMAGE: ${{ github.event.inputs.target-image }}

  copy-to-docker-hub-release:
    # MAJOR-RELEASE-IMPACTED
    if: github.ref_name == 'main' && contains(github.event.inputs.source-image,'v9') && (contains(github.event.inputs.target-image,'v9') || contains(github.event.inputs.target-image,'latest'))
    runs-on: ubuntu-latest
    environment:
      name: release
    steps:
      # Free disk space
      - name: Free Disk space
        if: github.event.inputs.free-space-before == 'true'
        shell: bash
        run: |
          sudo rm -rf /usr/local/lib/android  # will release about 10 GB if you don't need Android
          sudo rm -rf /usr/share/dotnet # will release about 20GB if you don't need .NET
          sudo rm -rf /opt/hostedtoolcache/CodeQL # large cache
          sudo rm -rf /opt/hostedtoolcache/go # Go toolcache
      # Login to docker hub
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      # Copy ghrc.io image to Docker Hub
      - name: Pull image from GHCR
        run: docker pull "${GITHUB_EVENT_INPUTS_SOURCE_IMAGE}"
        env:
          GITHUB_EVENT_INPUTS_SOURCE_IMAGE: ${{ github.event.inputs.source-image }}
      - name: Tag image for Docker Hub
        run: docker tag "${GITHUB_EVENT_INPUTS_SOURCE_IMAGE}" "${GITHUB_EVENT_INPUTS_TARGET_IMAGE}"
        env:
          GITHUB_EVENT_INPUTS_SOURCE_IMAGE: ${{ github.event.inputs.source-image }}
          GITHUB_EVENT_INPUTS_TARGET_IMAGE: ${{ github.event.inputs.target-image }}
      - name: Push image to Docker Hub
        run: docker push "${GITHUB_EVENT_INPUTS_TARGET_IMAGE}"
        env:
          GITHUB_EVENT_INPUTS_TARGET_IMAGE: ${{ github.event.inputs.target-image }}
