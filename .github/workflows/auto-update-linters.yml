---
name: "Auto-Update Linters"
on:
  # Run when there is an update in main
  push:
    branches:
      - main
      - auto-update
      - fixes/docgen
  # Automatically run every day at 21:49 UTC, before a start of hour peak
  schedule:
    - cron: "49 21 * * *"
  # Allow to manually trigger a run of the workflow
  workflow_dispatch:

permissions: {}
concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

###############
# Set the Job #
###############
jobs:

  build_help_versions:
    # Name the Job
    name: Auto-Update Linters
    # Set the agent to run on
    runs-on: ubuntu-latest
    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push, comment issues & post new PR
      # Remove the ones you do not need
      contents: write
      issues: write
      pull-requests: write
    environment:
      name: auto-update
    # Prevent duplicate run from happening when a forked push is committed
    if: (github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository) && github.repository == 'oxsecurity/megalinter'
    # Set max build time for the job
    timeout-minutes: 60
    ##################
    # Load all steps #
    ##################
    steps:
      ##########################
      # Checkout the code base #
      ##########################
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # Free disk space
      - name: Free Disk space
        shell: bash
        run: |
          sudo rm -rf /usr/local/lib/android  # will release about 10 GB if you don't need Android
          sudo rm -rf /usr/share/dotnet # will release about 20GB if you don't need .NET
          sudo rm -rf /opt/ghc
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /opt/hostedtoolcache/CodeQL # large cache
          sudo rm -rf /opt/hostedtoolcache/go # Go toolcache

      #######################
      # Docker Buildx setup #
      #######################
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      ########################
      # Get the current date #
      ########################
      - name: Get current date
        run: echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "${GITHUB_ENV}"

      ###################################
      # Build image locally for testing #
      ###################################
      - name: Build MegaLinter Docker Image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            BUILD_REVISION=auto_update_${{ github.sha }}
            BUILD_VERSION=auto_update_${{ github.sha }}
          load: true
          push: false
          secrets: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          tags: |
            oxsecurity/megalinter:auto_update_${{ github.sha }}
        timeout-minutes: 60

      #####################################
      # Collect linters versions & help    #
      #####################################
      - name: Collect latest versions and help
        id: compute_versions
        shell: bash
        run: docker run -e UPGRADE_LINTERS_VERSION=true -e GITHUB_SHA=${{ github.sha }} -e GITHUB_TOKEN="${GITHUB_TOKEN}" -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} -e GITHUB_OUTPUT="${GITHUB_OUTPUT}" -e MEGALINTER_VOLUME_ROOT="${GITHUB_WORKSPACE}" -v "/var/run/docker.sock:/var/run/docker.sock:rw" -v "/home/runner/work/_temp/_runner_file_commands":"/github/file_commands" -v "${GITHUB_WORKSPACE}:/tmp/lint" oxsecurity/megalinter:auto_update_${{ github.sha }}
        timeout-minutes: 60

      # Format markdown tables
      - name: Format Markdown tables
        id: format-md-tables
        run: npx --yes markdown-table-formatter@latest --verbose "./**/*.md" || true

      # Upload MegaLinter artifacts
      - name: Archive production artifacts
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: MegaLinter reports
          include-hidden-files: "true"
          path: |
            docs
            megalinter-reports

      # Track generated files so branch switches in create-pull-request do not fail on untracked outputs
      - name: Stage generated changes
        if: (github.event_name == 'workflow_dispatch' || steps.compute_versions.outputs.has_updated_versions == 1)
        run: |
          git add -A
          git status --short

      # Create pull request if there are updates or if the workflow has been launched manually
      - name: Create Pull Request
        id: cpr
        if: (github.event_name == 'workflow_dispatch' || steps.compute_versions.outputs.has_updated_versions == 1)
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          # SECURITY NOTE: A Personal Access Token (PAT) is used here so the
          # auto-update PR can trigger downstream CI workflows. End-users
          # should NOT copy this pattern — using a PAT is NOT recommended
          # because open-source projects have been heavily targeted by
          # supply-chain attacks recently, and a leaked PAT can give
          # attackers broad write access to your repository.
          # If you only need workflows to re-trigger after MegaLinter pushes
          # a fix, manually re-run the workflow or push another commit on
          # the branch instead of configuring a PAT.
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN  }}
          author: "Nicolas Vuillamy <nicolas.vuillamy@gmail.com>"
          commit-message: "[automation] Auto-update linters version, help and documentation"
          delete-branch: true
          title: "[automation] Auto-update linters version, help and documentation"
          body: "[automation] Auto-update linters version, help and documentation"
          labels: dependencies,automerge
      - name: Display Pull Request Info
        if: (github.event_name == 'workflow_dispatch' || steps.compute_versions.outputs.has_updated_versions == 1)
        run: |
          echo "Pull Request Number - ${STEPS_CPR_OUTPUTS_PULL_REQUEST_NUMBER}"
          echo "Pull Request URL - ${STEPS_CPR_OUTPUTS_PULL_REQUEST_URL}"
        env:
          STEPS_CPR_OUTPUTS_PULL_REQUEST_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          STEPS_CPR_OUTPUTS_PULL_REQUEST_URL: ${{ steps.cpr.outputs.pull-request-url }}
