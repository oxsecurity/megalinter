---
#########################
#########################
## Deploy Docker Image Linters ##
#########################
#########################
# Documentation:
# https://help.github.com/en/articles/workflow-syntax-for-github-actions
#

#######################################
# Start the job on all push to main #
#######################################
name: "Build & Deploy - BETA linters"
on:
  push:
    branches:
      - "main"
      - "dbgbeta"
    paths:
      - ".github/workflows/**"
      - "Dockerfile"
      - "**/Dockerfile"
      - "flavors/**"
      - "megalinter/**"
      - "mega-linter-runner/**"
      - "**/linter-versions.json"
      - "TEMPLATES/**"
      - ".trivyignore"
      - "**/*.sh"
      - "**/*.py"
      - "**/sh/**"
  # Allow manual runs even when BETA_LINTERS_ENABLED is set to false
  workflow_dispatch:

###############
# Set the Job #
###############
permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  get-linters-matrix:
    name: Get Linters Matrix
    if: ${{ github.event_name == 'workflow_dispatch' || vars.BETA_LINTERS_ENABLED != 'false' }}
    runs-on: ubuntu-latest
    outputs:
      jobs: ${{ steps.set-matrix.outputs.jobs }}
      linters: ${{ steps.set-matrix.outputs.linters }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Read linters_matrix.json
        id: set-matrix
        run: |
          amd_jobs=$(jq -c '[.["linux/amd64"][] | {linter: ., platform: "linux/amd64", runner: "ubuntu-latest"}]' .automation/generated/linters_matrix.json)
          arm_jobs=$(jq -c '[.["linux/arm64"][] | {linter: ., platform: "linux/arm64", runner: "ubuntu-24.04-arm"}]' .automation/generated/linters_matrix.json)
          jobs=$(jq -cn --argjson amd "${amd_jobs}" --argjson arm "${arm_jobs}" '$amd + $arm')
          echo "jobs=${jobs}" >> "${GITHUB_OUTPUT}"
          # Unique list of linters across platforms, used by the manifest-merge job
          linters=$(jq -c '([.["linux/amd64"][]] + [.["linux/arm64"][]]) | unique' .automation/generated/linters_matrix.json)
          echo "linters=${linters}" >> "${GITHUB_OUTPUT}"

  build:
    name: BETA/Linters
    runs-on: ${{ matrix.runner }}
    needs: get-linters-matrix
    permissions:
      actions: write
      packages: write
      # Require writing security events to upload SARIF file to security tab
      security-events: write
    environment:
      name: beta
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.get-linters-matrix.outputs.jobs) }}
    # Only run this on the main repo
    if: >-
      (
           github.repository == 'oxsecurity/megalinter'
        && !contains(github.event.head_commit.message, 'skip deploy')
        && !contains(github.event.head_commit.message, 'Release MegaLinter v')
        && (github.event_name == 'workflow_dispatch' || vars.BETA_LINTERS_ENABLED != 'false')
      )
    ##################
    # Load all steps #
    ##################
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "${GITHUB_ENV}"

      - name: Docker Metadata action
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        id: meta
        with:
          images: |
            ghcr.io/${{ github.repository }}-only-${{ matrix.linter }}
          flavor: |
            latest=false
            prefix=beta
          tags: |
            type=raw,value=
            type=raw,value={{date 'YYYYMMDD_HHmm'}}

      - name: Docker Metadata action (Docker hub)
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        id: meta-dhub
        with:
          images: |
            docker.io/${{ github.repository }}-only-${{ matrix.linter }}
          flavor: |
            latest=false
            prefix=beta
          tags: |
            type=raw,value=
            type=raw,value={{date 'YYYYMMDD_HHmm'}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: linters/${{ matrix.linter }}/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            BUILD_VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            BUILD_REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}
          secrets: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          # Push each platform by digest only; the merge job assembles the
          # multi-arch manifest list under the :beta and dated tags.
          outputs: type=image,"name=ghcr.io/${{ github.repository }}-only-${{ matrix.linter }}",push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=beta-linter-${{ matrix.linter }}-${{ matrix.platform }},ignore-error=true
          cache-to: type=gha,mode=max,scope=beta-linter-${{ matrix.linter }}-${{ matrix.platform }},compression=zstd

      - name: Export digest
        env:
          RUNNER_TEMP: ${{ runner.temp }}
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${BUILD_DIGEST}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: linter-beta-digests-${{ matrix.linter }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

      #####################################
      # Run Linter test cases #
      #####################################
      - name: Run Test Cases
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          GH_REPOSITORY: ${{ github.repository }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
          MATRIX_LINTER: ${{ matrix.linter }}
          DOCKER_IMAGE: ghcr.io/${{ github.repository }}-only-${{ matrix.linter }}@${{ steps.build.outputs.digest }}
          GH_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GITHUB_REPOSITORY=$([ "$EVENT_NAME" == "pull_request" ] && echo "$PR_HEAD_REPO" || echo "$GH_REPOSITORY")
          GITHUB_BRANCH=$([ "$EVENT_NAME" == "pull_request" ] && echo "$HEAD_REF" || echo "$REF_NAME")

          TEST_KEYWORDS_TO_USE_UPPER="${MATRIX_LINTER}"
          TEST_KEYWORDS_TO_USE="${TEST_KEYWORDS_TO_USE_UPPER,,}"
          docker image ls
          docker run -e TEST_CASE_RUN=true -e OUTPUT_FORMAT=text -e OUTPUT_FOLDER="${GH_SHA}" -e OUTPUT_DETAIL=detailed -e GITHUB_SHA="${GH_SHA}" -e GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" -e GITHUB_BRANCH="${GITHUB_BRANCH}" -e GITHUB_TOKEN="${GITHUB_TOKEN}" -e TEST_KEYWORDS="${TEST_KEYWORDS_TO_USE}" -e MEGALINTER_VOLUME_ROOT="${GITHUB_WORKSPACE}" -v "/var/run/docker.sock:/var/run/docker.sock:rw" -v "${GITHUB_WORKSPACE}:/tmp/lint" "${DOCKER_IMAGE}"
        timeout-minutes: 30

      # Docker Hub mirroring is disabled — MegaLinter is published to ghcr.io only.
      # - name: Invoke Mirror docker image workflow (Standalone linter image)
      #   uses: benc-uk/workflow-dispatch@7a027648b88c2413826b6ddd6c76114894dc5ec4 # v1
      #   with:
      #     workflow: mirror-docker-image.yml
      #     inputs: '{ "source-image": "${{ fromJson(steps.meta.outputs.json).tags[0]}}", "target-image": "${{ fromJson(steps.meta-dhub.outputs.json).tags[0]}}", "free-space-before": "false" }'

      ##############################################
      # Check Docker image security with Trivy #
      ##############################################
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          # renovate: datasource=github-releases depName=aquasecurity/trivy
          version: "v0.72.0"
          image-ref: "ghcr.io/${{ github.repository }}-only-${{ matrix.linter }}@${{ steps.build.outputs.digest }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          scanners: vuln
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          timeout: 10m0s
        env:
            ACTIONS_RUNTIME_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # - name: Run OSV-Scanner vulnerability scanner
      #   uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
      #   with:
      #     scan-args: |-
      #       --docker ${{ fromJson(steps.meta.outputs.json).tags[0]}}

  # Assemble a multi-arch manifest list per linter from the per-platform digests
  # pushed by the build job, then publish it under the :beta (and dated) tags.
  merge:
    name: BETA/Linters Merge
    runs-on: ubuntu-latest
    needs:
      - get-linters-matrix
      - build
    if: ${{ !cancelled() && github.repository == 'oxsecurity/megalinter' }}
    permissions:
      contents: read
      packages: write
    environment:
      name: beta
    strategy:
      fail-fast: false
      matrix:
        linter: ${{ fromJson(needs.get-linters-matrix.outputs.linters) }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: linter-beta-digests-${{ matrix.linter }}-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/${{ github.repository }}-only-${{ matrix.linter }}
          flavor: |
            latest=false
            prefix=beta
          tags: |
            type=raw,value=
            type=raw,value={{date 'YYYYMMDD_HHmm'}}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
          MATRIX_LINTER: ${{ matrix.linter }}
        run: |
          # shellcheck disable=SC2046
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "ghcr.io/${GITHUB_REPOSITORY_NAME}-only-${MATRIX_LINTER}@sha256:%s " *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/"${GITHUB_REPOSITORY_NAME}"-only-"${MATRIX_LINTER}":"${STEPS_META_OUTPUTS_VERSION}"
        env:
          STEPS_META_OUTPUTS_VERSION: ${{ steps.meta.outputs.version }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
          MATRIX_LINTER: ${{ matrix.linter }}
