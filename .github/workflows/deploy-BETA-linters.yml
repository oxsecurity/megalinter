---
#########################
#########################
## Deploy Docker Image Linters ##
#########################
#########################
# Documentation:
# https://help.github.com/en/articles/workflow-syntax-for-github-actions
#

#######################################
# Start the job on all push to main #
#######################################
name: "Build & Deploy - BETA linters"
on:
  push:
    branches:
      - "main"
      - "dbgbeta"
    paths:
      - ".github/workflows/**"
      - "Dockerfile"
      - "**/Dockerfile"
      - "flavors/**"
      - "megalinter/**"
      - "mega-linter-runner/**"
      - "**/linter-versions.json"
      - "TEMPLATES/**"
      - ".trivyignore"
      - "**/*.sh"
      - "**/*.py"
      - "**/sh/**"

###############
# Set the Job #
###############
permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  get-linters-matrix:
    name: Get Linters Matrix
    if: ${{ vars.BETA_LINTERS_ENABLED != 'false' }}
    runs-on: ubuntu-latest
    outputs:
      linters: ${{ steps.set-matrix.outputs.linters }}
      linters_arm: ${{ steps.set-matrix.outputs.linters_arm }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Read linters_matrix.json
        id: set-matrix
        run: |
          echo "linters=$(jq -c '[.["linux/amd64"][]]'  .automation/generated/linters_matrix.json)" >> "${GITHUB_OUTPUT}"
          echo "linters_arm=$(jq -c '[.["linux/arm64"][]]'  .automation/generated/linters_matrix.json)" >> "${GITHUB_OUTPUT}"

  build:
    name: BETA/Linters
    runs-on: ${{ matrix.runner }}
    needs: get-linters-matrix
    permissions:
      actions: write
      packages: write
      # Require writing security events to upload SARIF file to security tab
      security-events: write
    environment:
      name: beta
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        linter: ${{ fromJson(needs.get-linters-matrix.outputs.linters) }}
        runner: ["ubuntu-latest", "ubuntu-24.04-arm"]
    # Only run this on the main repo
    if: >-
      (
           github.repository == 'oxsecurity/megalinter'
        && !contains(github.event.head_commit.message, 'skip deploy')
        && !contains(github.event.head_commit.message, 'Release MegaLinter v')
        && vars.BETA_LINTERS_ENABLED != 'false'
      )
    ##################
    # Load all steps #
    ##################
    steps:
      # https://github.com/actions/runner/issues/1985
      - name: Prepare
        id: prepare
        run: |
          job_enabled=true
          platforms=linux/amd64

          ARM_RUNNER_REGEX="^ubuntu-.*-arm$"

          if [[ "${{ matrix.runner }}" =~ $ARM_RUNNER_REGEX ]]; then
            job_enabled="${{ contains(fromJson(needs.get-linters-matrix.outputs.linters_arm), matrix.linter) }}"
            platforms=linux/arm64
          fi

          echo "job_enabled=$job_enabled" >> "${GITHUB_OUTPUT}"
          echo "platforms=$platforms" >> "${GITHUB_OUTPUT}"

      - name: Checkout Code
        if: ${{ steps.prepare.outputs.job_enabled == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Docker Metadata action
        if: ${{ steps.prepare.outputs.job_enabled == 'true' }}
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        id: meta
        with:
          images: |
            ghcr.io/${{ github.repository }}-only-${{ matrix.linter }}
          flavor: |
            latest=false
            prefix=beta
          tags: |
            type=raw,value=
            type=raw,value={{date 'YYYYMMDD_HHmm'}}

      - name: Docker Metadata action (Docker hub)
        if: ${{ steps.prepare.outputs.job_enabled == 'true' }}
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        id: meta-dhub
        with:
          images: |
            docker.io/${{ github.repository }}-only-${{ matrix.linter }}
          flavor: |
            latest=false
            prefix=beta
          tags: |
            type=raw,value=
            type=raw,value={{date 'YYYYMMDD_HHmm'}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
        if: ${{ steps.prepare.outputs.job_enabled == 'true' && ( ( ( runner.arch != 'X64' || runner.os != 'Linux' ) && steps.prepare.outputs.platforms == 'linux/amd64' ) || steps.prepare.outputs.platforms != 'linux/amd64' ) }}

      - name: Set up Docker Buildx
        if: ${{ steps.prepare.outputs.job_enabled == 'true' }}
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to GitHub Container Registry
        if: ${{ steps.prepare.outputs.job_enabled == 'true' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        if: ${{ steps.prepare.outputs.job_enabled == 'true' }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: linters/${{ matrix.linter }}/Dockerfile
          platforms: ${{ steps.prepare.outputs.platforms }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            BUILD_VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            BUILD_REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}
          load: false
          push: ${{ github.event_name != 'pull_request' }}
          secrets: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          tags: ${{ steps.meta.outputs.tags }}

      #####################################
      # Run Linter test cases #
      #####################################
      - name: Run Test Cases
        if: ${{ steps.prepare.outputs.job_enabled == 'true' }}
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          GH_REPOSITORY: ${{ github.repository }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
          MATRIX_LINTER: ${{ matrix.linter }}
          DOCKER_IMAGE: ${{ fromJson(steps.meta.outputs.json).tags[0] }}
          GH_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GITHUB_REPOSITORY=$([ "$EVENT_NAME" == "pull_request" ] && echo "$PR_HEAD_REPO" || echo "$GH_REPOSITORY")
          GITHUB_BRANCH=$([ "$EVENT_NAME" == "pull_request" ] && echo "$HEAD_REF" || echo "$REF_NAME")

          TEST_KEYWORDS_TO_USE_UPPER="${MATRIX_LINTER}"
          TEST_KEYWORDS_TO_USE="${TEST_KEYWORDS_TO_USE_UPPER,,}"
          docker image ls
          docker run -e TEST_CASE_RUN=true -e OUTPUT_FORMAT=text -e OUTPUT_FOLDER="${GH_SHA}" -e OUTPUT_DETAIL=detailed -e GITHUB_SHA="${GH_SHA}" -e GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" -e GITHUB_BRANCH="${GITHUB_BRANCH}" -e GITHUB_TOKEN="${GITHUB_TOKEN}" -e TEST_KEYWORDS="${TEST_KEYWORDS_TO_USE}" -e MEGALINTER_VOLUME_ROOT="${GITHUB_WORKSPACE}" -v "/var/run/docker.sock:/var/run/docker.sock:rw" -v "${GITHUB_WORKSPACE}:/tmp/lint" "${DOCKER_IMAGE}"
        timeout-minutes: 30

      - name: Invoke Mirror docker image workflow (Standalone linter image)
        if: ${{ steps.prepare.outputs.job_enabled == 'true' }}
        uses: benc-uk/workflow-dispatch@7a027648b88c2413826b6ddd6c76114894dc5ec4 # v1
        with:
          workflow: mirror-docker-image.yml
          inputs: '{ "source-image": "${{ fromJson(steps.meta.outputs.json).tags[0]}}", "target-image": "${{ fromJson(steps.meta-dhub.outputs.json).tags[0]}}", "free-space-before": "false" }'

      ##############################################
      # Check Docker image security with Trivy #
      ##############################################
      # - name: Run Trivy vulnerability scanner
      #   if: ${{ steps.prepare.outputs.job_enabled == 'true' }}
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     image-ref: "${{ fromJson(steps.meta.outputs.json).tags[0]}}"
      #     format: "table"
      #     exit-code: "1"
      #     ignore-unfixed: true
      #     scanners: vuln
      #     vuln-type: "os,library"
      #     severity: "CRITICAL,HIGH"
      #     timeout: 10m0s
      #   env:
      #       ACTIONS_RUNTIME_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # - name: Run OSV-Scanner vulnerability scanner
      #   if: ${{ steps.prepare.outputs.job_enabled == 'true' }}
      #   uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
      #   with:
      #     scan-args: |-
      #       --docker ${{ fromJson(steps.meta.outputs.json).tags[0]}}
