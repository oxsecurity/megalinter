name: "DOC - Recover v9.5.0 deployment (temporary)"

# Temporary workflow to recover the doc deployment for v9.5.0
# after the release job failed in mike (alias '9' already specified as a version).
# Triggers only on the fix-doc4 branch (and manual dispatch).
# DELETE THIS FILE once v9.5.0 docs are confirmed live at https://megalinter.io.

on:
  push:
    branches:
      - fix-doc4
  workflow_dispatch:

permissions: {}
concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:

  recover_doc:
    runs-on: ubuntu-latest
    if: github.repository == 'oxsecurity/megalinter'
    permissions:
      contents: write
    environment:
      name: release
    env:
      CTAG: v9.5.0
      CVERSION: 9.5.0
      PTAG: v9.4.0
      PVERSION: 9.4.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.14.5
      - run: pip install --upgrade -r .config/python/dev/requirements.txt
      - run: cd .automation && bash build_schemas_doc.sh && cd ..
      - name: Configure git identity
        run: |
          git config --global user.name megalinter-bot
          git config --global user.email 129584137+megalinter-bot@users.noreply.github.com
          git stash || true
      - name: Checkout previous tag
        run: git checkout "${PTAG}"
      - name: Mike deploy previous version (9.4.0)
        run: |
          mike delete "${PVERSION}" || echo 'version does not exist yet'
          mike deploy "${PVERSION}"
      - name: Checkout current tag
        run: git checkout "${CTAG}"
      - name: Mike deploy current version (9.5.0 + latest + 9)
        run: |
          mike delete latest || true
          mike delete 9 || true
          mike deploy 9
          mike deploy --push latest "${CVERSION}"
