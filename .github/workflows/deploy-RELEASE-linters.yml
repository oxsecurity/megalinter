---
#########################
#########################
## Deploy Docker Image Flavors ##
#########################
#########################
# Documentation:
# https://help.github.com/en/articles/workflow-syntax-for-github-actions
#

#######################################
# Start the job on all push to main #
#######################################
name: "Build & Deploy - Release linters"
on:
  release:
    # Want to run the automation when a release is created
    types: ["created"]

###############
# Set the Job #
###############
permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  get-linters-matrix:
    name: Get Linters Matrix
    runs-on: ubuntu-latest
    outputs:
      linters: ${{ steps.set-matrix.outputs.linters }}
      linters_arm: ${{ steps.set-matrix.outputs.linters_arm }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Read linters_matrix.json
        id: set-matrix
        run: |
          echo "linters=$(jq -c '[.["linux/amd64"][]]'  .automation/generated/linters_matrix.json)" >> "${GITHUB_OUTPUT}"
          echo "linters_arm=$(jq -c '[.["linux/arm64"][]]'  .automation/generated/linters_matrix.json)" >> "${GITHUB_OUTPUT}"

  build:
    name: Deploy Docker Image - Release - Linters
    runs-on: ${{ matrix.runner }}
    needs: get-linters-matrix
    permissions:
      actions: write
      packages: write
      # Require writing security events to upload SARIF file to security tab
      security-events: write
    environment:
      name: release
    strategy:
      fail-fast: false
      matrix:
        linter: ${{ fromJson(needs.get-linters-matrix.outputs.linters) }}
        runner: ["ubuntu-latest", "ubuntu-24.04-arm"]
    # Only run this on the main repo
    if: github.repository == 'oxsecurity/megalinter' && !contains(github.event.head_commit.message, 'skip deploy')
    ##################
    # Load all steps #
    ##################
    steps:
      # https://github.com/actions/runner/issues/1985
      - name: Prepare
        id: prepare
        run: |
          job_enabled=true
          platforms=linux/amd64

          ARM_RUNNER_REGEX="^ubuntu-.*-arm$"

          if [[ "${{ matrix.runner }}" =~ $ARM_RUNNER_REGEX ]]; then
            job_enabled="${{ contains(fromJson(needs.get-linters-matrix.outputs.linters_arm), matrix.linter) }}"
            platforms=linux/arm64
          fi

          echo "job_enabled=$job_enabled" >> "${GITHUB_OUTPUT}"
          echo "platforms=$platforms" >> "${GITHUB_OUTPUT}"

      ##########################
      # Checkout the code base #
      ##########################
      - name: Checkout Code
        if: ${{ steps.prepare.outputs.job_enabled == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Login to GitHub Container Registry
        if: ${{ steps.prepare.outputs.job_enabled == 'true' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current date
        if: ${{ steps.prepare.outputs.job_enabled == 'true' }}
        run: echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "${GITHUB_ENV}"

      - name: Build Image
        if: ${{ steps.prepare.outputs.job_enabled == 'true' }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: Dockerfile-release
          platforms: ${{ steps.prepare.outputs.platforms }}
          build-args: |
            MEGALINTER_BASE_IMAGE=docker.io/oxsecurity/megalinter-only-${{ matrix.linter }}:beta
            BUILD_DATE=${{ env.BUILD_DATE }}
            BUILD_REVISION=${{ github.sha }}
            BUILD_VERSION=${{ github.event.release.tag_name }}
          load: false
          push: true
          secrets: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          # MAJOR-RELEASE-IMPACTED
          tags: |
            ghcr.io/oxsecurity/megalinter-only-${{ matrix.linter }}:v9
            ghcr.io/oxsecurity/megalinter-only-${{ matrix.linter }}:${{ github.event.release.tag_name }}
            ghcr.io/oxsecurity/megalinter-only-${{ matrix.linter }}:latest
          # One-shot per release; read BETA-linters' warm cache only.
          cache-from: type=gha,scope=beta-linter-${{ matrix.linter }}-${{ steps.prepare.outputs.platforms }},ignore-error=true

      - name: Invoke Mirror docker image workflow (Standalone image)
        if: ${{ steps.prepare.outputs.job_enabled == 'true' }}
        uses: benc-uk/workflow-dispatch@7a027648b88c2413826b6ddd6c76114894dc5ec4 # v1
        with:
          workflow: mirror-docker-image.yml
          # MAJOR-RELEASE-IMPACTED
          inputs: '{ "source-image": "ghcr.io/oxsecurity/megalinter-only-${{ matrix.linter }}:v9", "target-image": "docker.io/oxsecurity/megalinter-only-${{ matrix.linter }}:v9", "free-space-before": "false" }'
          ref: main
      - name: Invoke Mirror docker image workflow (Standalone image)
        if: ${{ steps.prepare.outputs.job_enabled == 'true' }}
        uses: benc-uk/workflow-dispatch@7a027648b88c2413826b6ddd6c76114894dc5ec4 # v1
        with:
          workflow: mirror-docker-image.yml
          # MAJOR-RELEASE-IMPACTED
          inputs: '{ "source-image": "ghcr.io/oxsecurity/megalinter-only-${{ matrix.linter }}:v9", "target-image": "docker.io/oxsecurity/megalinter-only-${{ matrix.linter }}:${{ github.event.release.tag_name }}", "free-space-before": "false" }'
          ref: main
      - name: Invoke Mirror docker image workflow (Standalone image)
        if: ${{ steps.prepare.outputs.job_enabled == 'true' }}
        uses: benc-uk/workflow-dispatch@7a027648b88c2413826b6ddd6c76114894dc5ec4 # v1
        with:
          workflow: mirror-docker-image.yml
          # MAJOR-RELEASE-IMPACTED
          inputs: '{ "source-image": "ghcr.io/oxsecurity/megalinter-only-${{ matrix.linter }}:v9", "target-image": "docker.io/oxsecurity/megalinter-only-${{ matrix.linter }}:latest", "free-space-before": "false" }'
          ref: main
      #####################################
      # Run Linter test cases #
      #####################################
      - name: Run Test Cases
        if: ${{ steps.prepare.outputs.job_enabled == 'true' }}
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          GH_REPOSITORY: ${{ github.repository }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
          MATRIX_LINTER: ${{ matrix.linter }}
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          GH_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GITHUB_REPOSITORY=$([ "$EVENT_NAME" == "pull_request" ] && echo "$PR_HEAD_REPO" || echo "$GH_REPOSITORY")
          GITHUB_BRANCH=$([ "$EVENT_NAME" == "pull_request" ] && echo "$HEAD_REF" || echo "$REF_NAME")

          TEST_KEYWORDS_TO_USE_UPPER="${MATRIX_LINTER}"
          TEST_KEYWORDS_TO_USE="${TEST_KEYWORDS_TO_USE_UPPER,,}"

          docker run -e TEST_CASE_RUN=true -e OUTPUT_FORMAT=text -e OUTPUT_FOLDER="${GH_SHA}" -e OUTPUT_DETAIL=detailed -e GITHUB_SHA="${GH_SHA}" -e GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" -e GITHUB_BRANCH="${GITHUB_BRANCH}" -e GITHUB_TOKEN="${GITHUB_TOKEN}" -e TEST_KEYWORDS="${TEST_KEYWORDS_TO_USE}" -e MEGALINTER_VOLUME_ROOT="${GITHUB_WORKSPACE}" -v "/var/run/docker.sock:/var/run/docker.sock:rw" -v "${GITHUB_WORKSPACE}:/tmp/lint" "ghcr.io/oxsecurity/megalinter-only-${MATRIX_LINTER}:${GITHUB_EVENT_RELEASE_TAG_NAME}"
        timeout-minutes: 30

      ##############################################
      # Check Docker image security with Trivy #
      ##############################################
      - name: Run Trivy vulnerability scanner
        if: ${{ steps.prepare.outputs.job_enabled == 'true' }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/oxsecurity/megalinter-only-${{ matrix.linter }}:${{ github.event.release.tag_name }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          scanners: vuln
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          timeout: 10m0s
        env:
            ACTIONS_RUNTIME_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # - name: Run OSV-Scanner vulnerability scanner
      #   if: ${{ steps.prepare.outputs.job_enabled == 'true' }}
      #   uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
      #   with:
      #     scan-args: |-
      #       --docker ghcr.io/oxsecurity/megalinter-only-${{ matrix.linter }}:${{ github.event.release.tag_name }}
